<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화학평형 시뮬레이터 v1.0 (수행평가 제출용)</title>
    <style>
        /* 고교/공학용 프로그램 특유의 투박하고 딱딱한 스타일러 */
        body {
            background-color: #d4d0c8; /* 윈도우 클래식 회색 */
            color: #000000;
            font-family: 'Malgun Gothic', 'Dotum', sans-serif;
            font-size: 13px;
            margin: 10px;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            background-color: #000080; /* 네이비 블루 */
            color: white;
            padding: 5px;
            margin: 0 0 10px 0;
            border: 2px inset #ffffff;
        }
        
        .main-layout {
            display: flex;
            gap: 10px;
        }

        /* 투박한 프레임 테두리 디자인 */
        .window-box {
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; /* 3D 입체 효과 */
            padding: 10px;
            box-sizing: border-box;
        }
        .window-title {
            background: linear-gradient(90deg, #0055e5, #9ec2ff);
            color: white;
            font-weight: bold;
            padding: 3px 6px;
            margin-bottom: 10px;
        }

        .left-panel { width: 350px; display: flex; flex-direction: column; gap: 10px; }
        .right-panel { flex: 1; min-width: 500px; }

        .input-group {
            margin-bottom: 8px;
            border-bottom: 1px dashed #808080;
            padding-bottom: 8px;
        }
        label { display: inline-block; width: 110px; font-weight: bold; }
        input[type="text"], input[type="number"] {
            width: 60px;
            border: 2px inset #ffffff;
            background: white;
            padding: 2px;
        }
        input[type="text"].formula-input { width: 180px; }

        /* 고전적인 사각형 버튼 */
        button {
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            font-size: 12px;
            padding: 5px 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 6px 7px 4px 9px;
        }
        .btn-block { width: 100%; margin-top: 4px; text-align: left; }

        /* 상태 창 */
        .status-screen {
            background-color: #000000;
            color: #00ff00; /* 터미널 초록색 */
            font-family: Courier, monospace;
            padding: 8px;
            border: 2px inset #ffffff;
            margin-top: 5px;
            font-size: 12px;
            line-height: 1.4;
        }

        canvas {
            background-color: #ffffff;
            border: 2px inset #ffffff;
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1>화학 평형 상태 및 농도 변화 시뮬레이션 시스템 (Ver 1.0.2)</h1>

    <div class="main-layout">
        <div class="left-panel">
            <div class="window-box">
                <div class="window-title">1. 반응식 설정 및 초기화</div>
                <div class="input-group">
                    <label>가상 화학식:</label>
                    <input type="number" id="coeff-A" value="1" min="1" max="3"> <strong>A</strong> + 
                    <input type="number" id="coeff-B" value="1" min="0" max="3"> <strong>B</strong> ⇄ 
                    <input type="number" id="coeff-C" value="2" min="1" max="4"> <strong>C</strong>
                </div>
                <div class="input-group">
                    <label>초기 평형수(K):</label>
                    <input type="number" id="input-k" value="0.50" step="0.05" style="width:50px;">
                </div>
                <button onclick="applyFormulaAndReset()" style="width: 100%; background-color: #b5b0a8;">반응식 적용 및 초기화</button>
            </div>

            <div class="window-box">
                <div class="window-title">2. 르샤틀리에 조건 변화 조작</div>
                
                <div style="margin-bottom: 10px;">
                    <strong>[농도 변동]</strong><br>
                    <button class="btn-block" onclick="triggerPerturb('add_A')">▶ 물질 A 급격히 추가 (+0.5M)</button>
                    <button class="btn-block" onclick="triggerPerturb('add_C')">▶ 물질 C 급격히 추가 (+0.5M)</button>
                </div>

                <div style="margin-bottom: 10px;">
                    <strong>[부피(압력) 변동]</strong><br>
                    <button class="btn-block" onclick="triggerPerturb('dec_V')">▶ 용기 부피 압축 (V → 0.5L) [압력↑]</button>
                    <button class="btn-block" onclick="triggerPerturb('inc_V')">▶ 용기 부피 팽창 (V → 2.0L) [압력↓]</button>
                </div>

                <div>
                    <strong>[계의 온도 변동]</strong><br>
                    <button class="btn-block" onclick="triggerPerturb('inc_T')">▶ 계 가열 (평형상수 K 감소 처리)</button>
                    <button class="btn-block" onclick="triggerPerturb('dec_T')">▶ 계 냉각 (평형상수 K 증가 처리)</button>
                </div>
            </div>

            <div class="window-box">
                <div class="window-title">3. 계의 상태 연산 결과 출력</div>
                <div class="status-screen" id="monitor">
                    SYSTEM READY...
                </div>
            </div>
        </div>

        <div class="right-panel window-box">
            <div class="window-title">📊 실시간 평형 농도 변화 그래프 (Time-Concentration Graph)</div>
            <canvas id="graphCanvas" width="750" height="430"></canvas>
            <div style="margin-top:8px; font-weight:bold; font-size:12px;">
                범례: 
                <span style="color:blue;">■ [A]</span> &nbsp;&nbsp; 
                <span style="color:cyan;">■ [B]</span> &nbsp;&nbsp; 
                <span style="color:red;">■ [C]</span> &nbsp;&nbsp; 
                <span style="color:orange;">--- 평형상수(K) 기준선</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        // 내부 물리량 제어 데이터 구조
        let model = {
            nA: 1.0, nB: 1.0, nC: 0.7071, // 각 기체의 몰수(mol)
            cA: 1.0, cB: 1.0, cC: 0.7071, // 각 기체의 몰농도(M)
            V: 1.0,
            K: 0.50,
            Q: 0.50,
            // 사용자가 입력할 반응 계수
            a: 1, b: 1, c: 2,
            history: [],
            time: 0
        };

        const k_f_const = 0.08; // 반응 속도 기본 인자

        // 사용자가 입력한 화학식 계수와 K값을 읽어서 시스템 재시작
        function applyFormulaAndReset() {
            model.a = parseInt(document.getElementById('coeff-A').value) || 1;
            model.b = parseInt(document.getElementById('coeff-B').value) || 0; // 0이면 반응 안함
            model.c = parseInt(document.getElementById('coeff-C').value) || 1;
            model.K = parseFloat(document.getElementById('input-k').value) || 0.5;

            // 계수에 맞춰 대략 평형 근처가 되도록 야매(?) 초기 몰수 자동 매칭
            model.V = 1.0;
            model.nA = 1.2;
            model.nB = model.b > 0 ? 1.2 : 0;
            // Q = [C]^c / ([A]^a * [B]^b) = K 가 되도록 
            let bottom = Math.pow(1.2, model.a) * Math.pow(model.b > 0 ? 1.2 : 1, model.b);
            model.nC = Math.pow(model.K * bottom, 1 / model.c);

            model.history = [];
            model.time = 0;

            // 초기 안정 기류 그래프 50스텝 생성
            for(let i=0; i<50; i++) {
                calculateKinetics();
            }
        }

        // 르샤틀리에 트리거 이벤트 처리 함수
        function triggerPerturb(type) {
            if (type === 'add_A') {
                model.nA += 0.5;
            } else if (type === 'add_C') {
                model.nC += 0.5;
            } else if (type === 'dec_V') {
                model.V = 0.5;
            } else if (type === 'inc_V') {
                model.V = 2.0;
            } else if (type === 'inc_T') {
                model.K = parseFloat((model.K * 0.4).toFixed(3)); // 온도 상승시 K 감소 예시
            } else if (type === 'dec_T') {
                model.K = parseFloat((model.K * 2.2).toFixed(3)); // 온도 하강시 K 증가 예시
            }
        }

        // 미분방정식 근사 기반 동적 농도 연산 루프
        function calculateKinetics() {
            // 1. 현재 농도 계산 (C = n/V)
            model.cA = model.nA / model.V;
            model.cB = model.b > 0 ? (model.nB / model.V) : 0;
            model.cC = model.nC / model.V;

            // 2. 반응지수 Q 계산
            let denominator = Math.pow(model.cA, model.a) * (model.b > 0 ? Math.pow(model.cB, model.b) : 1);
            if (denominator === 0) denominator = 0.0001;
            model.Q = Math.pow(model.cC, model.c) / denominator;

            // 3. 정반응 및 역반응 속도 연산 (기하급수 폭발 방지 캡핑)
            let r_f = k_f_const * Math.pow(model.cA, model.a) * (model.b > 0 ? Math.pow(model.cB, model.b) : 1);
            let k_b_const = k_f_const / model.K;
            let r_b = k_b_const * Math.pow(model.cC, model.c);
            
            let net_rate = (r_f - r_b) * 0.1; // dt = 0.1 역할
            
            // 농도 변화가 너무 과도하게 튀지 않도록 보정값 제한
            if(net_rate > 0.1) net_rate = 0.1;
            if(net_rate < -0.1) net_rate = -0.1;

            // 4. 화학 양론 계수(a, b, c)비율대로 몰수 변동 적용
            model.nA -= model.a * net_rate * model.V;
            if(model.b > 0) model.nB -= model.b * net_rate * model.V;
            model.nC += model.c * net_rate * model.V;

            // 몰수 음수 방지 가드코드
            if(model.nA < 0) model.nA = 0;
            if(model.nB < 0) model.nB = 0;
            if(model.nC < 0) model.nC = 0;

            model.time++;

            // 히스토리 배열에 데이터 축적
            model.history.push({
                cA: model.cA,
