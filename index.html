<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>르샤틀리에 원리 및 평형 상수(K/Q) 시뮬레이션</title>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --text: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 5px; color: #2c3e50; }
        .equation { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #7f8c8d; }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
        }

        .control-panel {
            flex: 1;
            min-width: 320px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .simulation-panel {
            flex: 1.5;
            min-width: 380px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .btn-group { display: flex; gap: 8px; }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #e0e0e0;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        button:hover { background-color: #d0d0d0; }
        button.active { background-color: var(--primary); color: white; }

        /* 대시보드 스타일 */
        .dashboard {
            background: #edf2f7;
            border-left: 5px solid #4a90e2;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .dashboard table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .dashboard td { padding: 4px 0; }
        .highlight { font-weight: bold; color: #e74c3c; }

        .chamber-container {
            position: relative;
            width: 320px;
            height: 300px;
            border: 4px solid #7f8c8d;
            border-top: none;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            transition: all 0.5s ease;
            margin-bottom: 15px;
        }

        .piston {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 15px;
            background-color: #7f8c8d;
            transition: top 0.5s ease;
            z-index: 10;
        }

        .particle { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); }
        .n2o4 { width: 16px; height: 16px; background-color: rgba(180, 200, 220, 0.8); border: 2px solid #7f8c8d; }
        .no2 { width: 10px; height: 10px; background-color: rgba(139, 69, 19, 0.9); box-shadow: 0 0 4px rgba(139, 69, 19, 0.5); }

        .status-box {
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .log-box {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 6px;
            font-size: 0.85rem;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>르샤틀리에 원리 기하·정량 시뮬레이터</h1>
    <div class="equation">N₂O₄ (무색) ⇄ 2NO₂ (적갈색) (발열반응)</div>

    <div class="container">
        <div class="control-panel">
            <div class="dashboard">
                <strong>[ 실시간 화학 평형 데이터 ]</strong>
                <table>
                    <tr>
                        <td>평형 상수 (K): <span id="val-k" style="font-weight:bold;">1.20</span></td>
                        <td>반응 지수 (Q): <span id="val-q" class="highlight">1.20</span></td>
                    </tr>
                    <tr>
                        <td colspan="2" style="border-top: 1px solid #cbd5e0; padding-top: 8px;">
                            <strong>상태 판정:</strong> <span id="status-relation" class="highlight">Q = K (평형 상태)</span>
                        </td>
                    </tr>
                </table>
            </div>

            <div class="control-group">
                <label>1. 농도 변화 (물질 추가)</label>
                <div class="btn-group">
                    <button onclick="addGas('N2O4')">N₂O₄ 추가 ([N₂O₄]↑)</button>
                    <button onclick="addGas('NO2')">NO₂ 추가 ([NO₂]↑)</button>
                </div>
            </div>

            <div class="control-group">
                <label>2. 압력 변화 (부피 조절)</label>
                <div class="btn-group">
                    <button id="p-high" onclick="changePressure('high')">압력 증가 (부피↓)</button>
                    <button id="p-normal" class="active" onclick="changePressure('normal')">보통</button>
                    <button id="p-low" onclick="changePressure('low')">압력 감소 (부피↑)</button>
                </div>
            </div>

            <div class="control-group">
                <label>3. 온도 변화 (*K값 자체를 변경)</label>
                <div class="btn-group">
                    <button id="t-high" onclick="changeTemperature('high')">온도 높임 (K 감소)</button>
                    <button id="t-normal" class="active" onclick="changeTemperature('normal')">보통</button>
                    <button id="t-low" onclick="changeTemperature('low')">온도 낮춤 (K 증가)</button>
                </div>
            </div>
            
            <button onclick="resetSim()" style="background-color: #e74c3c; color: white; width: 100%; margin-top: 5px;">시뮬레이션 초기화</button>
        </div>

        <div class="simulation-panel">
            <div class="chamber-container" id="chamber">
                <div class="piston" id="piston"></div>
            </div>

            <div class="status-box">
                <div><strong>N₂O₄ 몰수:</strong> <span id="count-n2o4">12</span>몰</div>
                <div><strong>NO₂ 몰수:</strong> <span id="count-no2">12</span>몰</div>
                <div><strong>현재 부피(V):</strong> <span id="val-v">1.0</span>L</div>
            </div>

            <div class="log-box" id="log">
                변수를 조절하면 Q와 K의 균형이 깨지며 정반응 혹은 역반응이 시작됩니다.
            </div>
        </div>
    </div>

    <script>
        // 초기 물리량 설정
        let state = {
            N2O4: 12,
            NO2: 12,
            V: 1.0, 
            K: 1.20,
            Q: 1.20
        };

        const chamber = document.getElementById('chamber');
        const piston = document.getElementById('piston');
        const logBox = document.getElementById('log');

        // Q와 K 계산 및 UI 업데이트
        function updateKQDashed() {
            // 농도 = 몰수 / 부피
            let conc_NO2 = state.NO2 / state.V;
            let conc_N2O4 = state.N2O4 / state.V;
            
            // Q = [NO2]^2 / [N2O4]
            state.Q = parseFloat(((conc_NO2 ** 2) / conc_N2O4).toFixed(3));
            
            document.getElementById('val-k').innerText = state.K.toFixed(2);
            document.getElementById('val-q').innerText = state.Q.toFixed(2);
            document.getElementById('val-v').innerText = state.V.toFixed(1);

            let relSpan = document.getElementById('status-relation');
            
            // 오차 감안 비교 (0.05 이내면 평형으로 간주)
            if (Math.abs(state.Q - state.K) < 0.08) {
                relSpan.innerText = "Q ≒ K (평형 도달)";
                relSpan.style.color = "#2ecc71";
            } else if (state.Q < state.K) {
                relSpan.innerText = "Q < K (정반응 진행)";
                relSpan.style.color = "#3498db";
            } else {
                relSpan.innerText = "Q > K (역반응 진행)";
                relSpan.style.color = "#e67e22";
            }
        }

        function renderParticles() {
            const particles = chamber.querySelectorAll('.particle');
            particles.forEach(p => p.remove());

            const width = chamber.clientWidth;
            const height = chamber.clientHeight;
            const pistonTop = parseInt(piston.style.top) || 0;
            
            const minY = pistonTop + 20;
            const maxY = height - 20;
            const minX = 20;
            const maxX = width - 20;

            for(let i=0; i<Math.round(state.N2O4); i++) createParticleElement('n2o4', minX, maxX, minY, maxY);
            for(let i=0; i<Math.round(state.NO2); i++) createParticleElement('no2', minX, maxX, minY, maxY);

            document.getElementById('count-n2o4').innerText = Math.round(state.N2O4);
            document.getElementById('count-no2').innerText = Math.round(state.NO2);
            
            let alpha = Math.min((state.NO2 / state.V) * 0.025, 0.85);
            chamber.style.backgroundColor = `rgba(139, 69, 19, ${alpha})`;
            
            updateKQDashed();
        }

        function createParticleElement(className, minX, maxX, minY, maxY) {
            const p = document.createElement('div');
            p.className = `particle ${className}`;
            p.style.left = `${Math.random() * (maxX - minX) + minX}px`;
            p.style.top = `${Math.random() * (maxY - minY) + minY}px`;
            chamber.appendChild(p);
        }

        // 1. 농도 조절로 인한 Q 변화
        function addGas(type) {
            if (type === 'N2O4') {
                state.N2O4 += 8;
                logBox.innerHTML = "<strong>[분모 증가]</strong> N₂O₄가 유입되어 순간적으로 <strong>Q < K</strong>가 됩니다. 분자를 키우기 위해 <strong>정반응</strong>이 일어납니다.";
                renderParticles();
                setTimeout(() => { // 평형 이동 연출
                    state.N2O4 -= 2.5; state.NO2 += 5;
                    renderParticles();
                }, 1200);
            } else {
                state.NO2 += 10;
                logBox.innerHTML = "<strong>[분자 증가]</strong> NO₂가 유입되어 순간적으로 <strong>Q > K</strong>가 됩니다. 분자를 줄이기 위해 <strong>역반응</strong>이 일어납니다.";
                renderParticles();
                setTimeout(() => {
                    state.NO2 -= 5; state.N2O4 += 2.5;
                    renderParticles();
                }, 1200);
            }
        }

        // 2. 부피(압력) 조절로 인한 Q 변화 (★핵심 고증: 부피가 제곱으로 영향)
        function changePressure(level) {
            document.getElementById('p-high').classList.remove('active');
            document.getElementById('p-normal').classList.remove('active');
            document.getElementById('p-low').classList.remove('active');
            document.getElementById(`p-${level}`).classList.add('active');

            if (level === 'high') {
                state.V = 0.5; // 부피 반감 -> 모든 농도 2배 -> Q는 2배 증가 (분자가 제곱이므로)
                piston.style.top = "130px";
                logBox.innerHTML = "<strong>[부피 감소]</strong> 부피(V) 감소로 순간 농도가 급증하여 <strong>Q > K</strong>가 됩니다. 기체 분자수를 줄이는 <strong>역반응</strong>이 진행됩니다.";
                renderParticles();
                setTimeout(() => {
                    state.NO2 -= 4; state.N2O4 += 2;
                    renderParticles();
                }, 1200);
            } else if (level === 'low') {
                state.V = 1.6;
                piston.style.top = "0px";
                logBox.innerHTML = "<strong>[부피 증가]</strong> 부피(V) 증가로 농도가 급감하여 <strong>Q < K</strong>가 됩니다. 기체 분자수를 늘리는 <strong>정반응</strong>이 진행됩니다.";
                renderParticles();
                setTimeout(() => {
                    state.N2O4 -= 2; state.NO2 += 4;
                    renderParticles();
                }, 1200);
            } else {
                resetSim();
            }
        }

        // 3. 온도 조절 (★온도는 Q가 아니라 평형 상수 K 자체를 바꿈)
        function changeTemperature(level) {
            document.getElementById('t-high').classList.remove('active');
            document.getElementById('t-normal').classList.remove('active');
            document.getElementById('t-low').classList.remove('active');
            document.getElementById(`t-${level}`).classList.add('active');

            if (level === 'high') {
                state.K = 0.40; // 발열 반응이므로 온도 높이면 K 감소
                logBox.innerHTML = "<strong>[온도 상승]</strong> 발열 반응 특성상 온도가 오르면 <strong>평형 상수 K가 감소</strong>합니다. 결과적으로 <strong>Q > K</strong>가 되어 <strong>역반응</strong>이 진행됩니다.";
                renderParticles();
                setTimeout(() => {
                    state.NO2 -= 4; state.N2O4 += 2;
                    renderParticles();
                }, 1200);
            } else if (level === 'low') {
                state.K = 2.80; // 온도 낮추면 K 증가
                logBox.innerHTML = "<strong>[온도 하강]</strong> 온도가 내려가면 <strong>평형 상수 K가 증가</strong>합니다. 결과적으로 <strong>Q < K</strong>가 되어 <strong>정반응</strong>이 진행됩니다.";
                renderParticles();
                setTimeout(() => {
                    state.N2O4 -= 2; state.NO2 += 4;
                    renderParticles();
                }, 1200);
            } else {
                resetSim();
            }
        }

        function resetSim() {
            state.N2O4 = 12; state.NO2 = 12; state.V = 1.0; state.K = 1.20;
            piston.style.top = "50px";
            document.getElementById('p-high').classList.remove('active');
            document.getElementById('p-low').classList.remove('active');
            document.getElementById('p-normal').classList.add('active');
            document.getElementById('t-high').classList.remove('active');
            document.getElementById('t-low').classList.remove('active');
            document.getElementById('t-normal').classList.add('addactive');
            logBox.innerText = "초기화되었습니다. K와 Q의 대소 비교를 관찰해보세요.";
            renderParticles();
        }

        piston.style.top = "50px";
        renderParticles();
    </script>
</body>
</html>
