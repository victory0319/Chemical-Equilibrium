<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>화학 평형 및 르샤틀리에 원리 실험실</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fafafa;
      color: #171717;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wrapper {
      max-width: 850px;
      width: 100%;
      background: #ffffff;
      padding: 25px;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 5px 0; }
    p { font-size: 0.85rem; color: #737373; margin: 0 0 20px 0; }
    
    .graph-section { width: 100%; margin-bottom: 20px; }
    canvas { width: 100%; background: #ffffff; border: 1px solid #e5e5e5; border-radius: 4px; display: block; }
    
    .legend { display: flex; gap: 20px; justify-content: center; margin-top: 10px; font-size: 0.85rem; font-weight: 500; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 12px; height: 3px; display: inline-block; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
      border-top: 1px solid #f5f5f5;
      padding-top: 20px;
    }

    .control-block { display: flex; flex-direction: column; gap: 15px; }
    .section-label { font-size: 0.85rem; font-weight: 700; color: #171717; margin-bottom: 6px; }
    
    /* 초기 농도 설정 스타일 */
    .init-input-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: #fafafa;
      padding: 10px;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      margin-top: 6px;
    }
    .init-input-item { display: flex; flex-direction: column; gap: 4px; font-size: 0.8rem; font-weight: 600; }
    .init-input-item input { padding: 6px; border: 1px solid #d4d4d4; border-radius: 4px; text-align: center; font-weight: 700; }
    .reset-btn { width: 100%; margin-top: 8px; padding: 8px; background: #171717; color: #fff; border: none; border-radius: 4px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
    .reset-btn:hover { background: #404040; }

    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
    .dynamic-btn-zone { display: flex; flex-direction: column; gap: 10px; }
    
    button {
      padding: 8px; background: #ffffff; color: #171717; border: 1px solid #d4d4d4;
      border-radius: 4px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.1s;
    }
    button:hover { background: #f5f5f5; border-color: #a3a3a3; }
    button:active { background: #e5e5e5; }
    
    select { width: 100%; padding: 8px; border: 1px solid #d4d4d4; border-radius: 4px; font-size: 0.85rem; background: #fff; }

    .monitor-block { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 4px; padding: 15px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th, .data-table td { padding: 8px 2px; border-bottom: 1px solid #e5e5e5; text-align: left; }
    .data-table tr:last-child th, .data-table tr:last-child td { border-bottom: none; }
    .data-table th { color: #737373; font-weight: 500; }
    .data-table td { font-weight: 600; text-align: right; }
  </style>
</head>
<body>

<div class="wrapper">
  <h1>화학 평형 및 르샤틀리에 원리 실험실</h1>
  <p>초기 농도를 직접 설정하고 다양한 조건 변화 버튼을 눌러 평형 이동을 확인해보세요.</p>

  <div class="graph-section">
    <canvas id="chartCanvas" width="800" height="340"></canvas>
    <div id="chart-legend" class="legend"></div>
  </div>

  <div class="dashboard-grid">
    
    <div class="control-block">
      <div>
        <div class="section-label">실험할 가역 반응식 선택</div>
        <select id="reaction-picker" onchange="loadSelectedPreset()">
          <option value="no2_n2o4">2NO₂ (적갈색) ⇄ N₂O₄ (무색)</option>
          <option value="haber">N₂ + 3H₂ ⇄ 2NH₃</option>
          <option value="hi">H₂ + I₂ ⇄ 2HI</option>
        </select>
        
        <div id="init-concentration-zone" class="init-input-box">
          </div>
        <button class="reset-btn" onclick="applyInitialConcentrations()">설정한 농도로 실험 리셋</button>
      </div>

      <div>
        <div class="section-label" style="margin-top: 5px;">르샤틀리에 조건 변화 버튼</div>
        
        <span style="font-size:0.75rem; color:#737373; font-weight:600; display:block; margin:4px 0;">[실시간 물질 추가/제거]</span>
        <div id="substance-buttons" class="dynamic-btn-zone">
          </div>

        <span style="font-size:0.75rem; color:#737373; font-weight:600; display:block; margin:12px 0 4px 0;">[부피 및 압력 조절]</span>
        <div class="btn-group">
          <button onclick="changeEnvironment('inc_P')">압력 증가 (부피 줄임)</button>
          <button onclick="changeEnvironment('dec_P')">압력 감소 (부피 늘림)</button>
        </div>

        <span style="font-size:0.75rem; color:#737373; font-weight:600; display:block; margin:4px 0;">[온도 조절]</span>
        <div class="btn-group">
          <button onclick="changeEnvironment('inc_T')">온도 높이기 (가열)</button>
          <button onclick="changeEnvironment('dec_T')">온도 낮추기 (냉각)</button>
        </div>
      </div>
    </div>

    <div class="monitor-block">
      <div class="section-label" style="margin-bottom:10px;">실시간 실험실 데이터</div>
      <table class="data-table">
        <tr>
          <th>현재 온도의 실제 평형 상수 (Kc)</th>
          <td id="data-kc">-</td>
        </tr>
        <tr>
          <th>현재 농도로 계산한 반응 지수 (Q)</th>
          <td id="data-q">-</td>
        </tr>
        <tr>
          <th>현재 실험 온도</th>
          <td id="data-temp">25 °C</td>
        </tr>
        <tr>
          <th>현재 용기 부피</th>
          <td id="data-vol">1.0 L</td>
        </tr>
        <tr>
          <th>반응의 이동 방향 판정</th>
          <td id="data-status" style="font-weight:700;">-</td>
        </tr>
      </table>
    </div>

  </div>
</div>

<script>
  const presets = {
    no2_n2o4: {
      title: "2NO₂ ⇄ N₂O₄ 평형 실험",
      components: [
        { name: "NO₂", type: "reactant", coeff: 2, init: 2.0, color: "#dc2626" },
        { name: "N₂O₄", type: "product", coeff: 1, init: 0.0, color: "#2563eb" }
      ],
      getK: (t) => 170.0 * Math.exp(-0.06 * (t - 25))
    },
    haber: {
      title: "N₂ + 3H₂ ⇄ 2NH₃ 평형 실험",
      components: [
        { name: "N₂", type: "reactant", coeff: 1, init: 1.0, color: "#d97706" },
        { name: "H₂", type: "reactant", coeff: 3, init: 3.0, color: "#059669" },
        { name: "NH₃", type: "product", coeff: 2, init: 0.0, color: "#7c3aed" }
      ],
      getK: (t) => 50.0 * Math.exp(-0.04 * (t - 25))
    },
    hi: {
      title: "H₂ + I₂ ⇄ 2HI 평형 실험",
      components: [
        { name: "H₂", type: "reactant", coeff: 1, init: 1.5, color: "#0891b2" },
        { name: "I₂", type: "reactant", coeff: 1, init: 1.5, color: "#db2777" },
        { name: "HI", type: "product", coeff: 2, init: 0.0, color: "#ea580c" }
      ],
      getK: (t) => 50.0 * Math.exp(-0.01 * (t - 25))
    }
  };

  let coreSim = { isRunning: false, current: null, V: 1.0, T: 25, species: [], history: [] };

  function loadSelectedPreset() {
    const code = document.getElementById('reaction-picker').value;
    const preset = presets[code];
    coreSim.current = preset;

    // 1. 초기 농도 기입 패널 동적 생성
    const inputZone = document.getElementById('init-concentration-zone');
    inputZone.innerHTML = '';
    preset.components.forEach((c, idx) => {
      inputZone.innerHTML += `
        <div class="init-input-item">
          <span style="color:${c.color}">[${c.name}] 초기 농도(M)</span>
          <input type="number" id="user-init-${idx}" value="${c.init}" min="0" max="5" step="0.5">
        </div>
      `;
    });

    // 2. 실시간 조절 버튼 동적 생성
    const btnZone = document.getElementById('substance-buttons');
    btnZone.innerHTML = '';
    preset.components.forEach((s, idx) => {
      btnZone.innerHTML += `
        <div class="btn-group">
          <button onclick="adjustMole(${idx}, 1.0)" style="border-left: 3px solid ${s.color}; font-weight:600;">${s.name} 추가 (+1M)</button>
          <button onclick="adjustMole(${idx}, -1.0)">${s.name} 제거 (-1M)</button>
        </div>
      `;
    });

    // 3. 그래프 범례 업데이트
    const leg = document.getElementById('chart-legend');
    leg.innerHTML = '';
    preset.components.forEach(s => {
      leg.innerHTML += `<div class="legend-item"><span class="dot" style="background:${s.color}"></span> [${s.name}]</div>`;
    });

    applyInitialConcentrations();
  }

  // 사용자가 입력한 초기 농도를 읽어서 시뮬레이션을 완전히 초기화하는 함수
  function applyInitialConcentrations() {
    if (!coreSim.current) return;

    coreSim.V = 1.0;
    coreSim.T = 25;
    coreSim.history = [];

    coreSim.species = coreSim.current.components.map((c, idx) => {
      const inputVal = parseFloat(document.getElementById(`user-init-${idx}`).value);
      const checkedVal = isNaN(inputVal) || inputVal < 0 ? 0 : inputVal;
      return {
        name: c.name, type: c.type, coeff: c.coeff, color: c.color,
        moles: checkedVal * coreSim.V, conc: checkedVal
      };
    });

    coreSim.isRunning = true;
  }

  function adjustMole(index, amount) {
    if(!coreSim.isRunning) return;
    coreSim.species[index].moles += amount * coreSim.V;
    if(coreSim.species[index].moles < 0) coreSim.species[index].moles = 0;
  }

  function changeEnvironment(action) {
    if(!coreSim.isRunning) return;
    if(action === 'inc_P') { coreSim.V = 0.5; }
    if(action === 'dec_P') { coreSim.V = 2.0; }
    if(action === 'inc_T') { coreSim.T = 65; }
    if(action === 'dec_T') { coreSim.T = 10; }
  }

  function calculationLoop() {
    if(!coreSim.isRunning) return;

    coreSim.species.forEach(s => s.conc = s.moles / coreSim.V);

    let targetKc = coreSim.current.getK(coreSim.T);
    let rPart = 1.0, pPart = 1.0;

    coreSim.species.forEach(s => {
      if(s.type === 'reactant') rPart *= Math.pow(s.conc, s.coeff);
      if(s.type === 'product') pPart *= Math.pow(s.conc, s.coeff);
    });

    let currentQ = rPart === 0 ? 9999 : pPart / rPart;

    let k = 0.3;
    let v_f = k * rPart;
    let v_b = (k / targetKc) * pPart;
    let net = (v_f - v_b) * 0.15;

    if(net > 0.05) net = 0.05;
    if(net < -0.05) net = -0.05;

    coreSim.species.forEach(s => {
      if(s.type === 'reactant') s.moles -= s.coeff * net * coreSim.V;
      if(s.type === 'product') s.moles += s.coeff * net * coreSim.V;
      if(s.moles < 0) s.moles = 0;
    });

    let dataPoint = {};
    coreSim.species.forEach(s => dataPoint[s.name] = s.conc);
    coreSim.history.push(dataPoint);
    if(coreSim.history.length > 200) coreSim.history.shift();

    document.getElementById('data-kc').innerText = targetKc.toFixed(2);
    document.getElementById('data-q').innerText = currentQ.toFixed(2);
    document.getElementById('data-temp').innerText = coreSim.T + " °C";
    document.getElementById('data-vol').innerText = coreSim.V.toFixed(1) + " L";

    let statusBox = document.getElementById('data-status');
    if(Math.abs(currentQ - targetKc) < (targetKc * 0.03 + 0.01)) {
      statusBox.innerText = "평형 상태 (변화 없음)"; statusBox.style.color = "#171717";
    } else if (currentQ < targetKc) {
      statusBox.innerText = "정반응 진행 중 (➡️)"; statusBox.style.color = "#2563eb";
    } else {
      statusBox.innerText = "역반응 진행 중 (⬅️)"; statusBox.style.color = "#dc2626";
    }
  }

  function renderDashboardChart() {
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const pL = 40, pT = 15, pB = 25, pR = 15;
    const w = canvas.width - pL - pR;
    const h = canvas.height - pT - pB;

    const maxM = 6.0;
    ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 1;
    for(let i=1; i<=6; i++) {
      let y = canvas.height - pB - (i / maxM) * h;
      ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(canvas.width - pR, y); stroke();
      ctx.fillStyle = '#a3a3a3'; ctx.font = '10px monospace';
      ctx.fillText(i.toFixed(1), pL - 24, y + 3);
    }

    ctx.strokeStyle = '#e5e5e5'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pL, pT); ctx.lineTo(pL, canvas.height - pB); ctx.lineTo(canvas.width - pR, canvas.height - pB); ctx.stroke();

    if(coreSim.history.length < 2) return;

    const getX = (idx) => pL + (idx / 200) * w;
    const getY = (val) => canvas.height - pB - (val / maxM) * h;

    coreSim.species.forEach(s => {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(getX(0), getY(coreSim.history[0][s.name]));
      for(let i=1; i<coreSim.history.length; i++) {
        ctx.lineTo(getX(i), getY(coreSim.history[i][s.name]));
      }
      ctx.stroke();
    });
  }

  // 첫 가동 실행 루프
  loadSelectedPreset();
  setInterval(() => {
    calculationLoop();
    renderDashboardChart();
  }, 50);
</script>
</body>
</html>
